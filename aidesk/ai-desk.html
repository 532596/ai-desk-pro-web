<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>AI Desk — iOS Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: linear-gradient(178deg, #EEF0FE 0%, #F1EFFB 52%, #F4F0FA 100%); }
  body {
    font-family: "Poppins", -apple-system, BlinkMacSystemFont,
                 "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  #root { display: flex; align-items: center; justify-content: center; padding: 24px; }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 6px); }
    to   { opacity: 1; transform: translate(-50%, 0);    }
  }
  @keyframes alertFade {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes alertPop {
    0%   { transform: scale(1.10); opacity: 0; }
    60%  { transform: scale(0.98); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .device-row:hover { background-color: rgba(120,120,128,0.08); }
  .device-row:active { background-color: rgba(120,120,128,0.14); }

  /* Health Index card — animation layers */

  /* Health Index — triple ring micro-interactions */
  @keyframes hiRingSway {
    0%, 100% { transform: rotate(-0.35deg) scale(1); }
    50%      { transform: rotate(0.35deg) scale(1.008); }
  }
  @keyframes hiRingStageIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes hiRingLayerBreath {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.014); opacity: 0.94; }
  }
  @keyframes hiRingCapPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.22); opacity: 0.82; }
  }
  @keyframes hiRingAmbient {
    0%, 100% { opacity: 0.42; transform: scale(0.96); }
    50%      { opacity: 0.68; transform: scale(1.02); }
  }
  @keyframes hiRingTapPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .hi-ring-stage {
    transform-origin: center center;
    position: relative;
  }
  .hi-ring-stage.is-entered {
    animation: hiRingStageIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) both,
               hiRingSway 11s ease-in-out 0.75s infinite;
  }
  .hi-ring-stage.is-tapping {
    animation: hiRingTapPulse 380ms cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
  }
  .hi-ring-stage.hi-flash.is-entered {
    animation: hiRingStageIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) both,
               hiRingSway 11s ease-in-out 0.75s infinite;
  }
  .hi-ring-ambient {
    position: absolute;
    inset: 10%;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.38);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
    pointer-events: none;
    animation: hiRingAmbient 5.5s ease-in-out infinite;
  }
  .hi-ring-layer {
    transition: opacity 0.28s ease, filter 0.28s ease;
  }
  .hi-ring-layer.is-dimmed {
    opacity: 0.38;
  }
  .hi-ring-layer.is-active .hi-ring-layer-body {
    animation: none;
    filter: drop-shadow(0 0 6px rgba(123,97,255,0.22));
  }
  .hi-ring-layer.is-active .hi-activity-ring-fill {
    filter: brightness(1.08);
  }
  .hi-ring-layer-body { transform-origin: center center; }
  .hi-ring-layer-0 .hi-ring-layer-body { animation: hiRingLayerBreath 4.8s ease-in-out infinite; }
  .hi-ring-layer-1 .hi-ring-layer-body { animation: hiRingLayerBreath 4.8s ease-in-out infinite 0.55s; }
  .hi-ring-layer-2 .hi-ring-layer-body { animation: hiRingLayerBreath 4.8s ease-in-out infinite 1.1s; }
  .hi-ring-hit {
    cursor: pointer;
    pointer-events: stroke;
  }
  .hi-ring-cap-dot { pointer-events: none; }
  .hi-ring-cap-core {
    transform-origin: center center;
    transform-box: fill-box;
  }
  .hi-ring-layer-0 .hi-ring-cap-core { animation: hiRingCapPulse 2.6s ease-in-out infinite; }
  .hi-ring-layer-1 .hi-ring-cap-core { animation: hiRingCapPulse 2.6s ease-in-out infinite 0.4s; }
  .hi-ring-layer-2 .hi-ring-cap-core { animation: hiRingCapPulse 2.6s ease-in-out infinite 0.8s; }
  .hi-ring-layer.is-active .hi-ring-cap-core { animation-duration: 1.4s; }
  .hi-ring-track-inner { pointer-events: none; }
  .hi-ring-bloom {
    pointer-events: none;
    transition: stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1),
                stroke-dasharray 900ms cubic-bezier(0.22, 1, 0.36, 1),
                stroke-opacity 0.28s ease;
  }
  .hi-ring-layer.is-active .hi-ring-bloom { stroke-opacity: 0.32; }
  .hi-activity-ring-fill {
    transition: stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1),
                stroke-dasharray 900ms cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.28s ease,
                stroke-width 0.28s ease;
  }
  .hi-ring-layer.is-active .hi-activity-ring-fill {
    stroke-width: calc(var(--hi-ring-stroke, 12px) + 1.5px);
  }
  @keyframes hiScoreCenter {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.005); }
  }
  .hi-score-center { animation: hiScoreCenter 6s ease-in-out infinite; transform-origin: center center; }

  /* Health index — unified ring + metrics panel */
  .hi-health-index {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    margin-top: 12px;
  }
  .hi-health-index-main {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0;
    min-width: 0;
    transform: translateX(-4px);
  }
  .hi-health-index-ring-col {
    position: relative;
    z-index: 1;
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .hi-health-index-right {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    flex: 0 0 auto;
    margin-left: 2px;
  }
  .hi-health-index-bridge {
    position: relative;
    flex: 0 0 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-self: stretch;
    gap: 22px;
    padding: 34px 0 30px;
    pointer-events: none;
  }
  .hi-health-index-bridge-line {
    display: block;
    height: 2px;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--bridge-from, rgba(110,139,255,0.35)) 0%, var(--bridge-to, rgba(110,139,255,0.06)) 100%);
    opacity: 0.62;
    transform-origin: left center;
    transition: opacity 0.28s ease, transform 0.28s ease, height 0.28s ease;
  }
  .hi-health-index-bridge-line.is-active {
    opacity: 1;
    height: 2.5px;
    transform: scaleX(1.06);
  }
  .hi-health-index-metrics-col {
    position: relative;
    flex: 0 0 135px;
    width: 135px;
    max-width: 135px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding-left: 2px;
  }
  .hi-health-index-sub {
    display: grid;
    grid-template-columns: 180px 135px;
    column-gap: 12px;
    row-gap: 8px;
    align-items: start;
    justify-content: center;
    width: 100%;
    transform: translateX(-4px);
  }
  .hi-health-index-sub-left {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 180px;
    justify-self: center;
  }
  .hi-health-index-sub-right {
    display: flex;
    align-items: center;
    width: 135px;
    max-width: 135px;
    justify-self: start;
    font-size: 11px;
    font-weight: 500;
    color: rgba(60, 60, 67, 0.55);
    letter-spacing: -0.05px;
    line-height: 1.2;
  }
  .hi-health-index-sub > .hi-health-index-sub-left:nth-child(1),
  .hi-health-index-sub > .hi-health-index-sub-right:nth-child(2) {
    align-self: center;
    min-height: 22px;
  }
  .hi-health-index-sub > .hi-health-index-sub-left:nth-child(3),
  .hi-health-index-sub > .hi-health-index-sub-right:nth-child(4) {
    align-self: start;
  }

  /* Smart score — rolling digits + live status */
  .hi-smart-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    transform: translateY(-2px);
  }
  .hi-score-spark {
    opacity: 0.5;
    animation: hiSparkTwinkle 3.8s ease-in-out infinite;
  }
  @keyframes hiSparkTwinkle {
    0%, 100% { opacity: 0.35; transform: scale(0.9) rotate(0deg); }
    50%      { opacity: 0.72; transform: scale(1) rotate(12deg); }
  }
  .hi-score-digits {
    display: flex;
    align-items: baseline;
    line-height: 1;
    font-size: var(--hi-score-size, 49px);
    transform: translateY(-4px);
  }
  .hi-score-digit-slot {
    display: inline-block;
    overflow: hidden;
    height: 1em;
    line-height: 1;
  }
  .hi-score-digit-cell {
    display: block;
    line-height: 1;
    font-size: inherit;
    font-weight: 700;
    letter-spacing: -0.04em;
    font-feature-settings: "tnum" 1, "lnum" 1;
    font-variant-numeric: tabular-nums lining-nums;
    background: linear-gradient(135deg, #6E8BFF 0%, #9A6BF0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    animation: hiDigitRoll 260ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes hiDigitRoll {
    0%   { transform: translateY(55%); opacity: 0.2; }
    100% { transform: translateY(0);  opacity: 1; }
  }
  .hi-score-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: -2px;
    transform: translateY(-5px);
  }
  .hi-score-live {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.35px;
    text-transform: uppercase;
    color: rgba(34, 40, 55, 0.40);
  }
  .hi-score-live-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #6F9E7E;
    animation: hiLivePulse 2.6s ease-in-out infinite;
  }
  .hi-smart-score.is-counting .hi-score-live-dot {
    animation: hiLivePulseFast 0.7s ease-in-out infinite;
  }
  .hi-smart-score.is-counting .hi-score-live {
    color: rgba(123, 97, 255, 0.65);
  }
  @keyframes hiLivePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.82); }
  }
  @keyframes hiLivePulseFast {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.75); }
  }
  .hi-score-tier {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.15px;
    color: #7B61FF;
    opacity: 0.85;
    transition: opacity 300ms ease;
  }
  .hi-smart-score.hi-score-flash .hi-score-digits {
    animation: hiScoreFlash 450ms ease-out 1;
  }
  @keyframes hiScoreFlash {
    0%, 100% { transform: scale(1); }
    35%      { transform: scale(1.05); }
  }

  /* +N particle on score change */
  @keyframes hiParticle {
    0%   { opacity: 0; transform: translate(0, 6px)  scale(0.6); }
    25%  { opacity: 1; transform: translate(0, -4px) scale(1.1); }
    100% { opacity: 0; transform: translate(0, -40px) scale(0.9); }
  }
  .hi-particle { animation: hiParticle 700ms ease-out forwards; }

  /* Score breakdown — collapsible panel below ring */
  .hi-score-details {
    width: 100%;
    max-width: 180;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hi-score-details.is-shown {
    opacity: 1;
    transform: translateY(0);
  }
  .hi-score-details-toggle-wrap {
    width: 100%;
    max-width: 180;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hi-score-details-toggle-wrap.is-shown {
    opacity: 1;
    transform: translateY(0);
  }
  .hi-score-details-body {
    max-width: none;
  }
  .hi-metrics-detail-entry {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.38s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
  }
  .hi-metrics-detail-entry.is-visible {
    max-height: 72px;
    opacity: 1;
  }
  .hi-metrics-detail-entry-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
    padding: 8px 10px;
    border: 1px solid rgba(20,30,60,0.06);
    border-radius: 12px;
    background: rgba(255,255,255,0.72);
    cursor: pointer;
    box-shadow: 0 4px 14px -10px rgba(20,30,60,0.14);
  }
  .hi-metrics-detail-entry-text {
    min-width: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    text-align: left;
  }
  .hi-metrics-detail-entry-title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(60,60,67,0.55);
    letter-spacing: -0.1px;
  }
  .hi-metrics-detail-entry-summary {
    font-size: 10px;
    font-weight: 600;
    color: rgba(60,60,67,0.42);
    letter-spacing: -0.05px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hi-metrics-detail-entry-chev {
    display: inline-flex;
    flex-shrink: 0;
    transform: rotate(-90deg);
    opacity: 0.55;
  }
  .hi-metric-sheet-section {
    margin-bottom: 18px;
  }
  .hi-metric-sheet-section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .hi-metric-sheet-section-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hi-metric-sheet-section-title {
    font-size: 15px;
    font-weight: 700;
    color: rgba(0,0,0,0.88);
    letter-spacing: -0.2px;
  }
  .hi-metric-sheet-section-value {
    margin-left: auto;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.1px;
  }
  .hi-metric-sheet-insight {
    margin: 0 2px 10px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(60,60,67,0.62);
    letter-spacing: -0.1px;
    line-height: 1.45;
  }
  .hi-metric-sheet-section-body {
    border-radius: 16px;
    padding: 14px 14px 12px;
    border: 1px solid rgba(20,30,60,0.05);
    box-shadow: none;
  }
  .hi-metric-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .hi-metric-timeline-item {
    display: flex;
    gap: 12px;
    min-height: 52px;
  }
  .hi-metric-timeline-rail {
    width: 10px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
  }
  .hi-metric-timeline-dot {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .hi-metric-timeline-line {
    flex: 1;
    width: 2px;
    min-height: 12px;
    margin: 4px 0 2px;
    border-radius: 99px;
  }
  .hi-metric-timeline-content {
    flex: 1;
    min-width: 0;
    padding-bottom: 14px;
  }
  .hi-metric-timeline-item:last-child .hi-metric-timeline-content {
    padding-bottom: 4px;
  }
  .hi-metric-timeline-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .hi-metric-timeline-primary {
    font-size: 14px;
    font-weight: 700;
    color: rgba(0,0,0,0.86);
    letter-spacing: -0.2px;
    line-height: 1.3;
  }
  .hi-metric-timeline-badge {
    display: inline-flex;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: -0.05px;
    white-space: nowrap;
  }
  .hi-metric-timeline-meta {
    margin-top: 3px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(60,60,67,0.52);
    letter-spacing: -0.05px;
    line-height: 1.35;
  }
  .hi-metric-timeline-time {
    font-weight: 600;
    color: rgba(60,60,67,0.62);
    font-feature-settings: "tnum";
  }
  .hi-metric-timeline-sep {
    margin: 0 4px;
    opacity: 0.45;
  }
  .hi-metric-sheet-progress {
    margin-top: 10px;
    padding-top: 12px;
    border-top: 1px solid rgba(20,30,60,0.06);
  }
  .hi-metric-sheet-progress-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(60,60,67,0.52);
    letter-spacing: -0.05px;
  }
  .hi-metric-sheet-progress-track {
    height: 6px;
    border-radius: 99px;
    background: rgba(255,255,255,0.72);
    overflow: hidden;
  }
  .hi-metric-sheet-progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hi-score-details-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    color: rgba(60,60,67,0.55);
    letter-spacing: -0.1px;
    line-height: 1.2;
  }
  .hi-score-details-chev {
    display: inline-flex;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hi-score-details-chev.is-open {
    transform: rotate(180deg);
  }
  .hi-score-details-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.38s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hi-score-details-panel.is-open {
    max-height: 220px;
  }
  .hi-score-details-inner {
    padding: 2px 2px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .hi-score-details-row-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 4px;
  }
  .hi-score-details-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(60,60,67,0.55);
    letter-spacing: -0.1px;
  }
  .hi-score-details-pts {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: -0.1px;
  }
  .hi-score-details-bar-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(120,120,128,0.12);
    overflow: hidden;
  }
  .hi-score-details-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .hi-score-details-total {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2px;
    padding-top: 8px;
    border-top: 1px solid rgba(20,30,60,0.06);
    font-size: 11px;
    font-weight: 600;
    color: rgba(60,60,67,0.55);
    letter-spacing: -0.1px;
  }

  /* Layer D: ambient background blob drift (12s loop) */
  @keyframes hiBreath {
    0%, 100% { transform: translate(0, 0);    opacity: 0.7; }
    50%      { transform: translate(18px, 12px); opacity: 1; }
  }
  .hi-breath   { animation: hiBreath 12s ease-in-out infinite; }
  .hi-breath-2 { animation: hiBreath 12s ease-in-out -6s infinite reverse; }

  /* ──────────────────────────────────────────────── */
  /* Agent recommendation — F / G / H / I / J        */
  /* ──────────────────────────────────────────────── */

  /* J: 小升 face blink — eye group briefly hidden every 8s */
  @keyframes xsBlink {
    0%, 95%, 100% { opacity: 1; }
    97%           { opacity: 0; }
  }
  .xs-blink { animation: xsBlink 8s infinite; }
  @keyframes xsBounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* Typewriter cursor */
  .typer-cursor {
    display: inline-block;
    width: 2px; height: 1em;
    margin-left: 2px;
    background: #1B6FF3;
    vertical-align: text-bottom;
    animation: cursorBlink 800ms steps(2) infinite;
  }
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  /* "Thinking" dots */
  .dot-typing {
    display: inline-block;
    animation: dotPulse 1100ms ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
    40%           { opacity: 1;    transform: translateY(-2px); }
  }

  /* G: status banner shake (one-shot when entering 60+) */
  @keyframes sbShake {
    0%, 100% { transform: translateX(0); }
    15%, 45%, 75% { transform: translateX(-3px); }
    30%, 60%      { transform: translateX(3px); }
  }
  .sb-shake { animation: sbShake 600ms cubic-bezier(.36,.07,.19,.97) both; }

  /* G: warn-icon wiggle (every 8s for warn level) */
  @keyframes sbWarnWiggle {
    0%, 88%, 100% { transform: rotate(0deg); }
    91%           { transform: rotate(-15deg); }
    94%           { transform: rotate(15deg); }
    97%           { transform: rotate(-10deg); }
  }
  .sb-warn-icon  { display: inline-block; animation: sbWarnWiggle 8s ease-in-out infinite; }

  /* G: danger-icon pulse */
  @keyframes sbDangerPulse {
    0%, 100% { transform: scale(1);   filter: drop-shadow(0 0 0 rgba(255,59,48,0)); }
    50%      { transform: scale(1.15); filter: drop-shadow(0 0 4px rgba(255,59,48,0.55)); }
  }
  .sb-danger-icon { display: inline-block; animation: sbDangerPulse 1.4s ease-in-out infinite; }

  /* G: warn text micro-blink */
  @keyframes sbBlinkText {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.65; }
  }
  .sb-blink { animation: sbBlinkText 1.8s ease-in-out infinite; }

  /* H: agent card cross-fade swap (rising → idle) */
  @keyframes agentCrossIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .agent-cross-in { animation: agentCrossIn 360ms cubic-bezier(.2,.7,.3,1) both; }

  /* I: card sinks slightly on delay */
  @keyframes agentSink {
    0%   { transform: translateY(-4px); opacity: 0.95; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .agent-sink { animation: agentSink 320ms ease-out both; }

  /* I: hourglass rotation */
  @keyframes hourglass {
    0%, 45%   { transform: rotate(0deg); }
    50%, 95%  { transform: rotate(180deg); }
    100%      { transform: rotate(360deg); }
  }

  /* Desk-rising arrow */
  @keyframes deskArrow {
    0%, 100% { transform: translate(-50%, 0); opacity: 0.7; }
    50%      { transform: translate(-50%, -4px); opacity: 1; }
  }

  .agent-cta:disabled { cursor: default; }
  .cta-check { animation: ctaCheckIn 240ms cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes ctaCheckIn {
    0%   { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* K/L: "NEW" badge pop on service tags after profile edit */
  @keyframes newBadgePop {
    0%   { transform: scale(0); opacity: 0; }

    100% { transform: scale(1); opacity: 1; }

  .new-badge-pop { animation: newBadgePop 320ms cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Health ring — preview arc slow pulse to draw attention */
  @keyframes hiPreviewPulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1;    }
  }
  .hi-ring-preview { animation: hiPreviewPulse 2.2s ease-in-out infinite; }

  /* Health card — preview hint pill gentle pulse */
  @keyframes hiPreviewHint {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-1px); }
  }
  .hi-preview-hint { animation: hiPreviewHint 2.2s ease-in-out infinite; }

  /* Robot mascot — gentle float + antenna glow + sparkle twinkle */
  @keyframes mascotFloat {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-7px) rotate(1.5deg); }
  }
  @keyframes mascotShadow {
    0%, 100% { transform: scaleX(1);    opacity: 0.30; }
    50%      { transform: scaleX(0.82); opacity: 0.18; }
  }
  @keyframes mascotGlow {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 0.72; transform: scale(1.06); }
  }
  @keyframes sparkleTwinkle {
    0%, 100% { opacity: 0.45; transform: scale(0.78); }
    50%      { opacity: 1;    transform: scale(1); }
  }
  .mascot-float  { animation: mascotFloat 4.5s ease-in-out infinite; transform-origin: 50% 80%; }
  .mascot-shadow { animation: mascotShadow 4.5s ease-in-out infinite; transform-origin: 50% 50%; }
  .mascot-glow   { animation: mascotGlow 5s ease-in-out infinite; transform-origin: center; }
  .sparkle-a { animation: sparkleTwinkle 3s ease-in-out infinite; }
  .sparkle-b { animation: sparkleTwinkle 3s ease-in-out 1s infinite; }
  .sparkle-c { animation: sparkleTwinkle 3s ease-in-out 2s infinite; }

  @keyframes mascotModeSwap {
    from { opacity: 0; transform: translateY(6px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

    animation: mascotModeSwap 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;

  /* Secondary-screen sheet slide-up + scrim fade */
  @keyframes sheetUp   { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes scrimIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rowStagger { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .sheet-up { animation: sheetUp .34s cubic-bezier(.2,.8,.25,1) both; }
  .scrim-in { animation: scrimIn .26s ease both; }
  .row-stagger { animation: rowStagger .42s cubic-bezier(.2,.8,.25,1) both; }

  /* Health buddy — tap bounce + bubble swap */
  @keyframes hiBuddyBounce {
    0%, 100% { transform: scale(1) translateY(0); }
    35%      { transform: scale(1.14) translateY(-3px); }
    65%      { transform: scale(0.96) translateY(0); }

  /* Health AI spark — glow pulse + orbit */
  @keyframes hiAiGlow {
    0%, 100% { opacity: 0.45; transform: scale(1); }
    50%      { opacity: 0.65; transform: scale(1.03); }

  .hi-ai-orbit { animation: hiAiOrbit 10s linear infinite; transform-origin: 24px 24px; }

  /* ── Home screen polish — motion & micro-interaction ── */

    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }

<body>

  <script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

    }

    constructor() {

      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };

            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;

            this._applyView();

        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);

          this._dragUp = null;
        };

        // tear the capture + listeners down synchronously.

        this._spill.addEventListener('pointercancel', up);
      });

      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;

    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');

      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);

      // a host resize (responsive grid, pane divider) would stretch the

    _enterReframe() {

    _exitReframe(commit) {

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {

      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);

        this._img.style.height = '100%';

        this._img.style.top = '50%';

      // pan works immediately on the overflowing axis without zooming first.

      // frame aspect ratio, so a responsive resize keeps the same crop. The

      const k = g.base * this._view.s;

      this._img.style.left = l; this._img.style.top = t;

      this._ring.style.borderRadius = mask ? '' : radius;

      const url = this._userUrl || srcAttr;

      if (!this.hasAttribute('data-reframe')) {

          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,

      // Toggle via style.display — the [hidden] attribute alone loses to

      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
